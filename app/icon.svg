<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e40af" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="url(#bg)" />
  <!-- Outer ring (the breathing boundary) -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.5" />
  <!-- Inner circle (the breath itself) -->
  <circle cx="16" cy="16" r="6" fill="white" opacity="0.95" />
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#1e40af" />
</svg>